<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ビジネス用語 フラッシュカード</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0d0d14;
            --surface: #16161f;
            --surface2: #1e1e2a;
            --border: rgba(255,255,255,0.07);
            --text: #f0f0f8;
            --text-sub: #7c7c9c;
            --accent: #7c6cff;
            --accent2: #ff6c9d;
            --accent3: #6cffce;
            --warn: #ffc96c;
            --cat-management: #7c6cff;
            --cat-marketing: #ff6c9d;
            --cat-hr: #6cffce;
            --cat-it: #6cb8ff;
            --cat-others: #ffb86c;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Noto Sans JP', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
            position: relative;
            overflow-x: hidden;
        }

        /* Animated background */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: 
                radial-gradient(ellipse 60% 40% at 20% 20%, rgba(124,108,255,0.12) 0%, transparent 60%),
                radial-gradient(ellipse 50% 50% at 80% 80%, rgba(255,108,157,0.08) 0%, transparent 60%),
                radial-gradient(ellipse 40% 60% at 50% 50%, rgba(108,255,206,0.04) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        .container {
            width: 100%;
            max-width: 400px;
            position: relative;
            z-index: 1;
        }

        /* ===== MENU VIEW ===== */
        #view-menu {
            display: flex;
            flex-direction: column;
            gap: 0;
        }

        .app-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 28px;
            gap: 8px;
        }

        .app-title {
            font-family: 'Space Mono', monospace;
            font-size: 11px;
            font-weight: 700;
            color: var(--text-sub);
            letter-spacing: 0.12em;
            text-transform: uppercase;
            line-height: 1.4;
        }

        .app-title span {
            display: block;
            font-family: 'Noto Sans JP', sans-serif;
            font-size: 22px;
            font-weight: 900;
            color: var(--text);
            letter-spacing: -0.02em;
            margin-top: 4px;
        }

        .dark-mode-toggle {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 50%;
            width: 38px;
            height: 38px;
            cursor: pointer;
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            flex-shrink: 0;
        }
        .dark-mode-toggle:hover { border-color: var(--accent); }

        /* Zunda speech bubble */
        .zunda-wrap {
            position: relative;
            display: inline-flex;
            flex-shrink: 0;
        }
        .zunda-wrap img { display: block; transition: transform 0.2s ease; }
        .zunda-wrap:hover img { transform: scale(1.08); }
        .zunda-bubble {
            display: none;
            position: fixed;
            background: #fff;
            color: #2a2a3a;
            font-family: 'Noto Sans JP', sans-serif;
            font-size: 12px;
            font-weight: 700;
            white-space: nowrap;
            padding: 7px 12px;
            border-radius: 12px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.18);
            border: 2px solid #6cffce;
            z-index: 100;
            pointer-events: none;
        }
        .zunda-bubble::after {
            content: '';
            position: absolute;
            bottom: 100%;
            left: 20px;
            border: 7px solid transparent;
            border-bottom-color: #6cffce;
        }
        .zunda-bubble::before {
            content: '';
            position: absolute;
            bottom: calc(100% + 2px);
            left: 20px;
            border: 6px solid transparent;
            border-bottom-color: #fff;
            z-index: 1;
        }
        .zunda-wrap:hover .zunda-bubble { display: block; animation: bubblePop 0.2s cubic-bezier(0.34,1.4,0.64,1) both; }
        @keyframes bubblePop {
            from { opacity: 0; transform: scale(0.8); }
            to   { opacity: 1; transform: scale(1); }
        }

        /* Mode toggle */
        .mode-pill {
            display: flex;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 100px;
            padding: 4px;
            margin-bottom: 24px;
            position: relative;
            overflow: hidden;
        }
        .mode-pill-track {
            position: absolute;
            top: 4px; left: 4px;
            width: calc(50% - 4px);
            height: calc(100% - 8px);
            background: var(--accent);
            border-radius: 100px;
            transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
        }
        .mode-pill.swapped .mode-pill-track { transform: translateX(100%); }
        .mode-btn {
            flex: 1;
            padding: 9px 0;
            font-size: 11px;
            font-weight: 700;
            color: var(--text-sub);
            z-index: 1;
            text-align: center;
            cursor: pointer;
            transition: color 0.2s;
            letter-spacing: 0.05em;
            user-select: none;
        }
        .mode-btn.active { color: white; }

        /* Section labels */
        .section-label {
            font-family: 'Space Mono', monospace;
            font-size: 9px;
            font-weight: 700;
            color: var(--text-sub);
            letter-spacing: 0.15em;
            text-transform: uppercase;
            margin-bottom: 10px;
            margin-top: 20px;
            padding-left: 2px;
        }
        .section-label:first-of-type { margin-top: 0; }

        /* Menu buttons */
        .menu-btn {
            width: 100%;
            padding: 15px 18px;
            border-radius: 14px;
            border: 1px solid var(--border);
            background: var(--surface);
            color: var(--text);
            font-family: 'Noto Sans JP', sans-serif;
            font-weight: 700;
            font-size: 13.5px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 8px;
            text-align: left;
            position: relative;
            overflow: hidden;
        }
        .menu-btn:last-child { margin-bottom: 0; }

        .btn-icon {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            flex-shrink: 0;
        }

        .btn-label { flex: 1; }
        .btn-count {
            font-family: 'Space Mono', monospace;
            font-size: 10px;
            color: var(--text-sub);
            font-weight: 400;
        }

        .menu-btn:hover {
            transform: translateX(4px);
            border-color: rgba(255,255,255,0.15);
        }

        .btn-all {
            background: linear-gradient(135deg, rgba(124,108,255,0.15), rgba(255,108,157,0.1));
            border-color: rgba(124,108,255,0.3);
        }
        .btn-all:hover { border-color: var(--accent); }
        .btn-all .btn-icon { background: rgba(124,108,255,0.2); }

        .btn-star {
            border-color: rgba(255,201,108,0.3);
        }
        .btn-star:hover { border-color: var(--warn); }
        .btn-star .btn-icon { background: rgba(255,201,108,0.15); }

        .btn-management .btn-icon { background: rgba(124,108,255,0.15); }
        .btn-marketing .btn-icon  { background: rgba(255,108,157,0.15); }
        .btn-hr .btn-icon         { background: rgba(108,255,206,0.15); }
        .btn-it .btn-icon         { background: rgba(108,184,255,0.15); }
        .btn-others .btn-icon     { background: rgba(255,184,108,0.15); }

        .cat-dot {
            width: 3px;
            height: 28px;
            border-radius: 2px;
            flex-shrink: 0;
        }

        /* ===== STUDY VIEW ===== */
        #view-study { display: none; }

        .study-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
        }

        .back-btn {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 8px 14px;
            color: var(--text-sub);
            font-family: 'Space Mono', monospace;
            font-size: 10px;
            font-weight: 700;
            cursor: pointer;
            letter-spacing: 0.08em;
            transition: all 0.2s;
            flex-shrink: 0;
        }
        .back-btn:hover { color: var(--text); border-color: rgba(255,255,255,0.2); }

        .study-cat-label {
            flex: 1;
            font-size: 11px;
            font-weight: 700;
            color: var(--text-sub);
            letter-spacing: 0.05em;
        }

        .star-btn {
            background: none;
            border: none;
            font-size: 22px;
            cursor: pointer;
            color: var(--surface2);
            -webkit-text-stroke: 1.5px #4a4a5a;
            transition: all 0.2s;
            line-height: 1;
        }
        .star-btn.active {
            color: var(--warn);
            -webkit-text-stroke: 0;
            filter: drop-shadow(0 0 6px rgba(255,201,108,0.5));
        }

        /* Progress bar */
        .progress-bar-wrap {
            background: var(--surface);
            border-radius: 4px;
            height: 3px;
            margin-bottom: 20px;
            overflow: hidden;
        }
        .progress-bar-fill {
            height: 100%;
            background: var(--accent);
            border-radius: 4px;
            transition: width 0.4s ease;
        }

        /* Card */
        .card-container {
            perspective: 1200px;
            width: 100%;
            height: 220px;
            cursor: pointer;
            margin-bottom: 16px;
        }

        .card {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.55s cubic-bezier(0.34, 1.2, 0.64, 1), opacity 0.15s ease;
        }
        .card.is-flipped { transform: rotateY(180deg); }
        .card.no-transition { transition: none !important; }
        .card.fading { opacity: 0; }

        .card-face {
            position: absolute;
            inset: 0;
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 28px 24px;
            background: var(--surface);
            border: 1px solid var(--border);
            overflow: hidden;
        }

        .card-face::before {
            content: '';
            position: absolute;
            top: -30px; right: -30px;
            width: 120px; height: 120px;
            border-radius: 50%;
            background: var(--accent);
            opacity: 0.05;
        }

        .card-face-back { transform: rotateY(180deg); }

        .card-hint {
            font-family: 'Space Mono', monospace;
            font-size: 9px;
            letter-spacing: 0.15em;
            color: var(--text-sub);
            text-transform: uppercase;
            margin-bottom: 16px;
            opacity: 0.6;
        }

        .term-text {
            font-family: 'Space Mono', monospace;
            font-size: 30px;
            font-weight: 700;
            color: var(--text);
            letter-spacing: -0.02em;
            text-align: center;
            line-height: 1.1;
        }

        .meaning-text {
            font-size: 14px;
            line-height: 1.8;
            font-weight: 400;
            color: var(--text);
            text-align: center;
        }

        /* Controls */
        .controls {
            display: grid;
            grid-template-columns: 1fr 2fr 1fr;
            gap: 8px;
            margin-bottom: 14px;
        }

        .nav-btn {
            padding: 14px;
            border: none;
            border-radius: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 13px;
            font-family: 'Noto Sans JP', sans-serif;
        }

        .nav-btn-prev, .nav-btn-next {
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--text-sub);
            font-size: 18px;
        }
        .nav-btn-prev:hover, .nav-btn-next:hover {
            border-color: rgba(255,255,255,0.2);
            color: var(--text);
        }

        .nav-btn-flip {
            background: var(--accent);
            color: white;
            letter-spacing: 0.05em;
        }
        .nav-btn-flip:hover { opacity: 0.9; transform: translateY(-1px); }

        .progress-text {
            font-family: 'Space Mono', monospace;
            font-size: 10px;
            color: var(--text-sub);
            text-align: center;
            letter-spacing: 0.1em;
        }

        .hidden { display: none !important; }

        /* Light mode overrides */
        body.light-mode {
            --bg: #f0f0f8;
            --surface: #ffffff;
            --surface2: #f5f5fc;
            --border: rgba(0,0,0,0.08);
            --text: #1a1a2e;
            --text-sub: #888899;
        }
        body.light-mode::before {
            background:
                radial-gradient(ellipse 60% 40% at 20% 20%, rgba(124,108,255,0.08) 0%, transparent 60%),
                radial-gradient(ellipse 50% 50% at 80% 80%, rgba(255,108,157,0.06) 0%, transparent 60%);
        }

        /* ===== ZUNDA MODE ===== */
        body.zunda-mode {
            --bg: #0d1f10;
            --surface: #132b16;
            --surface2: #1a3a1e;
            --border: rgba(108,255,150,0.15);
            --text: #e8f8ea;
            --text-sub: #6aac72;
            --accent: #3ecf5a;
            --accent2: #6cffce;
            --accent3: #aaff6c;
            --warn: #ffd76c;
            --cat-management: #3ecf5a;
            --cat-marketing: #6cffce;
            --cat-hr: #aaff6c;
            --cat-it: #6cefff;
            --cat-others: #ffd76c;
        }
        body.zunda-mode::before {
            background:
                radial-gradient(ellipse 60% 40% at 20% 20%, rgba(62,207,90,0.18) 0%, transparent 60%),
                radial-gradient(ellipse 50% 50% at 80% 80%, rgba(108,255,206,0.12) 0%, transparent 60%),
                radial-gradient(ellipse 40% 60% at 50% 50%, rgba(170,255,108,0.06) 0%, transparent 70%);
        }
        body.zunda-mode .zunda-bubble {
            border-color: #3ecf5a;
            background: #e8f8ea;
            color: #0d1f10;
        }
        body.zunda-mode .zunda-bubble::after { border-bottom-color: #3ecf5a; }
        body.zunda-mode .zunda-bubble::before { border-bottom-color: #e8f8ea; }
        body.zunda-mode .mode-pill-track { background: #3ecf5a; }
        body.zunda-mode .nav-btn-flip { background: #3ecf5a; }
        body.zunda-mode .progress-bar-fill { background: #3ecf5a; }

        .zunda-mode-toggle {
            background: var(--surface);
            border: 1px solid rgba(62,207,90,0.4);
            border-radius: 50%;
            width: 38px;
            height: 38px;
            cursor: pointer;
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            flex-shrink: 0;
        }
        .zunda-mode-toggle:hover { border-color: #3ecf5a; }
        body.zunda-mode .zunda-mode-toggle {
            background: rgba(62,207,90,0.2);
            border-color: #3ecf5a;
            box-shadow: 0 0 10px rgba(62,207,90,0.3);
        }

        /* Animations */
        @keyframes fadeSlideUp {
            from { opacity: 0; transform: translateY(12px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .menu-btn { animation: fadeSlideUp 0.3s ease both; }
        .menu-btn:nth-child(1) { animation-delay: 0.02s; }
        .menu-btn:nth-child(2) { animation-delay: 0.05s; }
        .menu-btn:nth-child(3) { animation-delay: 0.08s; }
        .menu-btn:nth-child(4) { animation-delay: 0.11s; }
        .menu-btn:nth-child(5) { animation-delay: 0.14s; }
        .menu-btn:nth-child(6) { animation-delay: 0.17s; }
        .menu-btn:nth-child(7) { animation-delay: 0.2s; }
    </style>
</head>

    let filteredCards = [];
    let currentIndex = 0;
    let isSwappedMode = false;
    let starredIds = JSON.parse(localStorage.getItem('starredBusinessTerms') || '[]');

    // 吹き出しの位置をズンダ画像に合わせて動的に設定（画面外にはみ出さないよう調整）
    (function() {
        const wrap = document.querySelector('.zunda-wrap');
        const bubble = document.getElementById('zunda-bubble');
        if (!wrap || !bubble) return;
        wrap.addEventListener('mouseenter', function() {
            const rect = wrap.getBoundingClientRect();
            bubble.style.top = (rect.bottom + 10) + 'px';
            bubble.style.left = '0px'; // 一旦左端に置いてからwidthを取得
            bubble.style.visibility = 'hidden';
            bubble.style.display = 'block';
            const bubbleW = bubble.offsetWidth;
            bubble.style.display = '';
            bubble.style.visibility = '';
            let left = rect.left;
            if (left + bubbleW > window.innerWidth - 8) {
                left = window.innerWidth - bubbleW - 8;
            }
            if (left < 8) left = 8;
            bubble.style.left = left + 'px';
        });
    })();

    function toggleDarkMode() {
        document.body.classList.remove('zunda-mode');
        document.body.classList.toggle('light-mode');
        localStorage.setItem('flashcards-lightmode', document.body.classList.contains('light-mode'));
        localStorage.setItem('flashcards-zundamode', 'false');
    }
    function toggleZundaMode() {
        const isZunda = document.body.classList.toggle('zunda-mode');
        if (isZunda) {
            document.body.classList.remove('light-mode');
            localStorage.setItem('flashcards-lightmode', 'false');
        }
        localStorage.setItem('flashcards-zundamode', isZunda);
    }
    if (localStorage.getItem('flashcards-zundamode') === 'true') {
        document.body.classList.add('zunda-mode');
    } else if (localStorage.getItem('flashcards-lightmode') === 'true') {
        document.body.classList.add('light-mode');
    }

    function toggleMode() {
        isSwappedMode = !isSwappedMode;
        document.getElementById('mode-selector').classList.toggle('swapped');
        document.getElementById('mode-normal').classList.toggle('active');
        document.getElementById('mode-swapped').classList.toggle('active');
    }

    function startStudy(cat, label) {
        if (cat === 'all') {
            filteredCards = [...termData].sort(() => Math.random() - 0.5);
        } else if (cat === 'stars') {
            filteredCards = termData.filter(d => starredIds.includes(d.id)).sort(() => Math.random() - 0.5);
        } else {
            filteredCards = termData.filter(d => d.category === cat).sort(() => Math.random() - 0.5);
        }
        if (filteredCards.length === 0) { alert("登録されている用語がありません。"); return; }
        document.getElementById('current-cat').textContent = label;
        currentIndex = 0;
        updateCard();
        document.getElementById('view-menu').classList.add('hidden');
        document.getElementById('view-study').style.display = 'block';
    }

    function showMenu() {
        document.getElementById('view-study').style.display = 'none';
        document.getElementById('view-menu').classList.remove('hidden');
    }

    function updateCard() {
        const data = filteredCards[currentIndex];
        const front = document.getElementById('card-front-text');
        const back = document.getElementById('card-back-text');
        front.textContent = isSwappedMode ? data.meaning : data.term;
        back.textContent = isSwappedMode ? data.term : data.meaning;
        front.style.fontSize = front.textContent.length > 12 ? '16px' : (isSwappedMode ? '16px' : '30px');
        front.style.fontFamily = (isSwappedMode || front.textContent.length > 12) ? "'Noto Sans JP', sans-serif" : "'Space Mono', monospace";
        back.style.fontSize = back.textContent.length > 20 ? '13px' : (isSwappedMode ? '28px' : '14px');
        document.getElementById('star-btn').classList.toggle('active', starredIds.includes(data.id));
        const prog = `${currentIndex + 1} / ${filteredCards.length}`;
        document.getElementById('progress').textContent = prog;
        document.getElementById('progress-fill').style.width = `${((currentIndex + 1) / filteredCards.length) * 100}%`;
        // is-flipped は goToCard 側でアニメーションなしに除去するのでここでは触らない
        const card = document.getElementById('card');
        if (!card.classList.contains('fading')) {
            card.classList.add('no-transition');
            card.classList.remove('is-flipped');
            card.offsetHeight;
            card.classList.remove('no-transition');
        }
    }

    function toggleStar() {
        const id = filteredCards[currentIndex].id;
        starredIds.includes(id) ? starredIds = starredIds.filter(i => i !== id) : starredIds.push(id);
        localStorage.setItem('starredBusinessTerms', JSON.stringify(starredIds));
        document.getElementById('star-btn').classList.toggle('active', starredIds.includes(id));
    }

    function flipCard() { document.getElementById('card').classList.toggle('is-flipped'); }

    function goToCard(newIndex) {
        const card = document.getElementById('card');
        const isFlipped = card.classList.contains('is-flipped');

        if (isFlipped) {
            // まずフェードアウト
            card.classList.add('fading');
            setTimeout(() => {
                // テキストを差し替え
                currentIndex = newIndex;
                // フリップをアニメーションなしで戻す
                card.classList.add('no-transition');
                card.classList.remove('is-flipped');
                // 強制リフロー
                card.offsetHeight;
                card.classList.remove('no-transition');
                updateCard();
                // フェードイン
                card.classList.remove('fading');
            }, 150);
        } else {
            // 表向きの場合もフェードアウトしてからテキスト差し替え
            card.classList.add('fading');
            setTimeout(() => {
                currentIndex = newIndex;
                updateCard();
                card.classList.remove('fading');
            }, 150);
        }
    }

    function nextCard() { goToCard((currentIndex + 1) % filteredCards.length); }
    function prevCard() { goToCard((currentIndex - 1 + filteredCards.length) % filteredCards.length); }
</script>
</body>
</html>
